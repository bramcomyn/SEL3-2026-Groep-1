[build-system]
requires = ["hatchling >= 1.26"]
build-backend = "hatchling.build"

[project]
name = "brittle-star-locomotion"
version = "0.1.0"
description = "Research project for brittle star locomotion"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "jax[cuda13]==0.9.0.1",
    "wandb==0.24.2",
    "biorobot==0.4.2",
    "evosax==0.2.0",
    "matplotlib==3.10.8",
    "mediapy==1.2.6",
    "ipykernel==7.2.0",
    "PyOpenGL==3.1.10",
    "PyOpenGL_accelerate==3.1.10"
]
