name: Deploy API Docs

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Build Documentation
        run: |
          # 1. Install dependencies (ensure sphinx/furo are in your pyproject.toml)
          uv sync 

          # 2. Run apidoc to generate .rst files from src/
          # We point to the internal package folder
          uv run sphinx-apidoc -o docs/api/source/api src/brittle_star_locomotion

          # 3. Build the actual HTML
          uv run sphinx-build -b html docs/api/source docs/api/build/html

          touch docs/api/build/html/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs/api/build/html'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
