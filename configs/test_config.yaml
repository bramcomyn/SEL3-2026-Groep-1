checkpoint_directory: "checkpoints"

rl:
  observations_to_use: null

environment:
  fixed_evaluation_action: "0,1,3,4,2"
  number_of_arms: 5
  number_of_segments_per_arm: 2
  render_every_x_frames: 2
  number_of_environments: 1
  seed: 43
  camera_ids: [0, 1]
  frames_per_second: 50
  arena:
    size_x: 5.0
    size_y: 5.0
    sand_ground_color: False
    attach_target: True
    wall_height: 0.5
    wall_thickness: 0.1
  target_distance: 3.0
  simulation_time: 20.0
  number_of_physics_steps_per_control_step: 10
  time_scale: 1.0
  render_size_x: 680
  render_size_y: 400

gait:
  fixed_number_of_evaluation_modulation_steps: 20
  fixed_number_of_evaluation_substeps_per_modulation: 50

cpg:
  seed: 42
  solver: "rk4"
  time_step: 0.01
  base_frequency_multiplier: 2.0
  coupling_strength: 5.0
