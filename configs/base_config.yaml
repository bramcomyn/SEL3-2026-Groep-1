checkpoint_directory: "checkpoints"

logging:
  use_wandb: True

rl:
  seed: 42
  epsilon: 1.0
  epsilon_decay: 0.975
  epsilon_min: 0.01
  learning_rate: 0.0001
  gamma: 0.95
  hidden_size: 64
  amount_of_hidden_layers: 2
  shared_params: true
  n_episodes: 100
  batch_size: 256
  target_update_freq: 300
  replay_buffer_size: 10000
  observations_to_use: [
    "angle_to_target",
    "xy_distance_to_target",
    "joint_position",
  ]

environment:
  target_position: [1, 1, 0.05]
  random_initial_rotation: False
  fixed_evaluation_action: "0,1,3,4,2"
  number_of_arms: 5
  number_of_segments_per_arm: 3
  render_every_x_frames: 2
  number_of_environments: 1
  seed: 43
  camera_ids: [0, 1]
  frames_per_second: 50
  arena:
    size_x: 5.0
    size_y: 5.0
    sand_ground_color: False
    attach_target: True
    wall_height: 0.5
    wall_thickness: 0.1
  target_distance: 1.5
  simulation_time: 20.0
  number_of_physics_steps_per_control_step: 10
  time_scale: 1.0
  render_size_x: 720
  render_size_y: 480

gait:
  fixed_number_of_evaluation_modulation_steps: 20
  fixed_number_of_evaluation_substeps_per_modulation: 50

cpg:
  seed: 44
  solver: "rk4"
  time_step: 0.01
  base_frequency_multiplier: 2.0
  coupling_strength: 5.0
